##############################################################
# [Scenario C] 스파이크 테스트 - 급격한 트래픽 증가/감소
#
# 목적:
#   단기간 트래픽 폭증 시 HikariCP 커넥션 고갈 시점 및
#   회복 패턴 측정. pool=10 → pool=30 최적화 효과 비교.
#
# ── 시간축 ──────────────────────────────────────────────────
#   0~1분   : 워밍업  (0→20명, 5명/초)
#   1~3분   : 급증    (20→200명, 30명/초) ← 병목 발생 예상 구간
#   3~8분   : 유지    (200명 steady)       ← 고갈 지속 여부 확인
#   8~11분  : 회복    (200→50명, 10명/초) ← HikariCP pending 감소 패턴
#
# ── 합격 기준 (Pass Criteria) ──────────────────────────────
#   [병목 확인 기준 - pool=10]
#     hikaricp_connections_pending  : 급증 구간(1~3분)에서 5 이상
#     hikaricp_connection_timeout_total: 1 이상 발생 (병목 증명)
#     p99 레이턴시                  : 기준선(Scenario A) 대비 300% 이상 악화
#     에러율                        : 5xx 1% 이상 허용 (병목 의도적 유발)
#
#   [최적화 기준 - pool=30 이후 재실행 시]
#     hikaricp_connections_pending  : 급증 구간에서 2 이하 유지
#     p99 레이턴시                  : 기준선 대비 150% 이내
#     에러율                        : 0.1% 이하
#
# ── 병목 원인 분리 체크리스트 ───────────────────────────────
# 아래 3가지를 동시에 관찰하여 "무엇이 먼저 한계에 도달했는지" 판별:
#
#   [앱 레이어 - Spring Boot pod]
#     hikaricp_connections_pending   → DB 커넥션 풀 병목
#     hikaricp_connection_timeout_total → 타임아웃 발생 여부
#     Spring Boot 로그 "Connection is not available" 메시지
#     pod CPU > 800m or Memory > 700Mi → 앱 자체 과부하
#     pod restart count > 0            → OOM/Crash
#
#   [인프라 레이어 - Node / DB]
#     Node CPU / Memory (Grafana: Node Exporter 대시보드)
#     MySQL 응답시간 (Tempo: DB span duration)
#     MySQL max_connections 도달 여부 (show status like 'Max_used_connections')
#
#   [부하발생기 - Locust Worker pods]
#     Worker pod CPU > 500m → Locust가 먼저 한계 (결과 신뢰 불가)
#     Worker pod Memory > 400Mi → 동일
#     Worker pod restart → 부하 발생기 자체 장애
#     확인: kubectl top pods -n load-testing
#     기준: Worker CPU가 앱 CPU보다 먼저 포화되면 C 결과 무효
#
# ── 원인 판별 플로우 ────────────────────────────────────────
#   1. Locust worker CPU/Mem 먼저 확인
#      → 포화? → Worker 증설(workerReplicas: 5) 후 재실행
#      → 정상? → 다음 단계
#   2. hikaricp_connections_pending 급증 확인
#      → 급증? → DB 커넥션 풀 병목 확정 → pool-size 조정
#      → 정상? → 다음 단계
#   3. Spring Boot CPU/Memory 급증 확인
#      → 급증? → 앱 자체 병목 → JVM 튜닝 또는 스케일아웃
#
# ── 사용 방법 ──────────────────────────────────────────────
#   kubectl apply -f locust-test-scenario-c.yaml
#   kubectl top pods -n load-testing   # Worker 상태 1분 간격 확인
#
# 측정 지표:
#   - Locust: RPS, 에러율, p95/p99
#   - Prometheus: hikaricp_connections_pending, timeout_total
#   - kubectl top: load-testing Worker CPU/Mem vs portfogram pod CPU/Mem
#   - Tempo: DB span duration 분포 (급증 구간 vs 유지 구간 비교)
##############################################################
apiVersion: locust.io/v1
kind: LocustTest
metadata:
  name: portfogram.scenario-c-spike
  namespace: load-testing
  annotations:
    test/phase: "scenario-c"
    test/description: "스파이크 테스트 (20→200→50 users, 11min)"
    test/pass-criteria: "pool=10 병목 확인, Locust Worker 포화 여부 먼저 검증"
spec:
  image: locustio/locust:2.20.0
  workerReplicas: 3
  configMap: locust-scripts
  masterCommandSeed: >-
    --locustfile /lotest/src/locustfile.py
    --headless
    -u 200
    -r 30
    --run-time 11m
    --host http://spring-portfogram-server.portfogram.svc.cluster.local:8080
  workerCommandSeed: "--locustfile /lotest/src/locustfile.py"
